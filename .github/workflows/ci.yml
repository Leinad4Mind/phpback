name: CI

on:
  push:
    branches: [master, ci4-migration]
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, sqlite3, intl, mbstring, curl
          coverage: none
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Run frontend tests (Vitest)
        run: npm test

      - name: Build frontend assets
        run: npm run build

      # public/dist is committed so self-hosted deploys don't need Node.
      # Fail if the committed build no longer matches the sources.
      - name: Verify committed frontend build is fresh
        run: |
          if [ -n "$(git status --porcelain public/dist)" ]; then
            git status --porcelain public/dist
            echo "::error::public/dist is stale. Run 'npm run build' locally and commit the result."
            exit 1
          fi

      - name: Run test suite (SQLite unit/feature + MariaDB upgrade)
        env:
          MARIADB_HOST: 127.0.0.1
          MARIADB_PORT: 3306
          MARIADB_USER: root
          MARIADB_PASS: root
        run: vendor/bin/phpunit --colors=never
